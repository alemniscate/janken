<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ジャンケンで勝負</title>
    <meta name="viewport" content="width=device.width, initial-scale=1.0">
    <style>
        @keyframes hg_spin {to {transform: rotate(360deg);}}
        .hourglass {font-size: 5em; display: inline-block; animation: hg_spin 4s linear infinite;}

        h3 {color: white; background-color: blue; font-size: 1.0em}
        body {text-align: center; font-size: 2.5em;}
        button {font-size: 1.0em; width: 7em; margin: 0.1em;}
    </style>
</head>
<body>
    <div id="loading">
        <div class="hourglass">⏳</div>
        <div>読み込み中です ... 少々お待ちください</div>
    </div>
    <div id="content" style="display:none;">
        <h3>ジャンケンで勝負</h3>
        <div>
            <div id="disp"></div><hr>
            <div>
                <button mpy-click="check_goo">✊グー</button>
                <button mpy-click="check_choki">✌チョキ</button>
                <button mpy-click="check_paa">✋パー</button>
            </div>
        </div>
    </div>
</body>    
<script type="module" src="https://pyscript.net/releases/2025.8.1/core.js"></script>
<script type="mpy">
    from pyscript import document
    document.getElementById("loading").style.display="none"
    document.getElementById("content").style.display="block"

    import random

    GOO = 0
    CHOKI = 1
    PAA = 2

    HANDS = ["✊グー", "✌チョキ", "✋パー"]
    RESULTS = ["あいこ", "😊勝ち", "😭負け"]

    def check_goo(event):
        check(GOO)

    def check_choki(event):
        check(CHOKI)

    def check_paa(event):
        check(PAA)

    def check(user):
        com = random.randint(0, 2)
        result = janken(user, com)
        disp = document.getElementById("disp")
        disp.innerHTML = f"相手: {HANDS[com]}<br>自分: {HANDS[user]}<br><hr>判定: {RESULTS[result]}"
    
    def janken(user, com):
        if user == com:
            return 0
        elif (user == GOO) and (com == CHOKI):
            return 1
        elif (user == CHOKI) and (com == PAA):
            return 1
        elif (user == PAA) and (com == GOO):
            return 1
        else:
            return 2
    </script>
</html>
